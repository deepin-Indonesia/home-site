# ===== deepin Indonesia — Home Site =====
# Domain: deepin.id
# Tema dari submodule deepin-theme-site

# === Tema ===
theme: deepin-theme-site

sass:
  style: compressed

# Site settings
title: deepin Indonesia
tagline: Komunitas Resmi Pengguna deepin Linux di Indonesia
email: deepin@siberin.id
description: >-
  deepin Indonesia — Komunitas resmi deepin Linux di Indonesia. Download deepin 25, gabung komunitas, baca berita, tips, dan tutorial deepin terbaru.
baseurl: ""
url: "https://deepin.id"
github_username: deepin-Indonesia
telegram_group: Linux_deepin_ID

# SEO & Social
locale: id_ID
twitter:
  username: deepinID
  card: summary_large_image
social:
  name: deepin Indonesia
  links:
    - https://t.me/Linux_deepin_ID
    - https://github.com/deepin-Indonesia

# Build settings
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# jekyll-seo-tag settings
webmaster_verifications:
  google: # tambahkan kode verifikasi Google Search Console nanti
  bing: # tambahkan kode verifikasi Bing nanti

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
  - LICENSE

include:
  - robots.txt

# Collections (for future pages in separate repos)
collections:
  download:
    output: true
  release_notes:
    output: true
  news:
    output: true

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: "default"
      lang: "id"
  - scope:
      path: "assets/images"
    values:
      image: true
