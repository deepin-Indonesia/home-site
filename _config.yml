# ===== deepin Indonesia — Home Site =====
# Domain: deepin.id
# Tema dari submodule deepin-theme-site

# === Gunakan tema dari submodule ===
# Setelah menjalankan: git submodule add https://github.com/deepin-Indonesia/deepin-theme-site.git _theme
# Uncomment baris di bawah:
#
# layouts_dir: _theme/_layouts
# includes_dir: _theme/_includes
# data_dir: _theme/_data
#
# sass:
#   load_paths:
#     - _theme/assets/css

# Site settings
title: deepin Indonesia
tagline: Komunitas Resmi Pengguna deepin Linux di Indonesia
email: deepin@siberin.id
description: >-
  deepin Indonesia adalah komunitas resmi pengguna dan pengembang deepin Linux di Indonesia.
  Download deepin, baca berita terbaru, release notes, dan gabung komunitas.
  deepin adalah distribusi Linux dengan UI modern, cantik, mudah digunakan, dan aman.
baseurl: ""
url: "https://deepin.id"
github_username: deepin-Indonesia
telegram_group: Linux_deepin_ID

# SEO & Social
locale: id_ID
twitter:
  username: deepinID
  card: summary_large_image
social:
  name: deepin Indonesia
  links:
    - https://t.me/Linux_deepin_ID
    - https://github.com/deepin-Indonesia

# Build settings
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# jekyll-seo-tag settings
webmaster_verifications:
  google: # tambahkan kode verifikasi Google Search Console nanti
  bing: # tambahkan kode verifikasi Bing nanti

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
  - LICENSE

include:
  - robots.txt

# Collections (for future pages in separate repos)
collections:
  download:
    output: true
  release_notes:
    output: true
  news:
    output: true

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: "default"
      lang: "id"
  - scope:
      path: "assets/images"
    values:
      image: true

sass:
  style: compressed
  sass_dir: assets/css
